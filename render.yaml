services:
  - type: web
    name: emc-assistant
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DB_DIR
        value: /opt/render/project/src
      - key: PYTHON_VERSION
        value: "3.11.6"
    plan: free
