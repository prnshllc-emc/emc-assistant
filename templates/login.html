<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — EMC Assistant</title>
<link rel="stylesheet" href="/static/style.css">
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
</head>
<body>
<div class="login-container">
  <div class="login-card">
    <img src="https://d2xsxph8kpxj0f.cloudfront.net/310519663215721079/DVkqoX9Va4zPSQUoric8hK/LOGOparaloja_4cf1ac4d.png" alt="EMC" class="login-logo">
    <h1>Assistente <span>EMC</span></h1>
    <p>Entre com suas credenciais</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="seu@email.com" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary">Entrar</button>
    </form>
  </div>
</div>
</body>
</html>
